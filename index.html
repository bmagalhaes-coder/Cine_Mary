<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catálogo Cine Mary+</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header id="header"></header>

    <!-- ================= BANNER ================= -->

    <section id="banner">

        <div class="banner-overlay">

            <h1>Bem-vindo ao Cine Mary+</h1>

            <p>
                Confira os filmes em cartaz e escolha sua próxima aventura!
            </p>

        </div>

    </section>

    <!-- ================= CARDS ================= -->

    <main>

        <section id="catalogo"></section>

    </main>

    <!-- ================= POPUP ================= -->

    <div id="popup" class="popup">

        <div class="popup-conteudo">

            <button id="fecharPopup">&times;</button>

            <img id="popupImagem" src="" alt="Poster do filme">

            <h2 id="popupTitulo"></h2>

            <div class="popup-info">

                <p id="popupClassificacao"></p>

                <p id="popupDuracao"></p>

                <p id="popupHorario"></p>
                
                <p id="popupAno"></p>

            </div>

            <h3>Sinopse</h3>

            <p id="popupSinopse"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
